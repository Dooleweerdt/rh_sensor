# Increase stack memory to avoid crashes
CONFIG_MAIN_STACK_SIZE=8192

# Enable USB subsystem
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# Enable the Nordic QSPI driver specifically
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Enable Display Drivers
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Enable the Character Frame Buffer
CONFIG_CHARACTER_FRAMEBUFFER=y

# Graphics Support
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y
#CONFIG_LV_Z_COLOR_MONO_HW_INVERSION=y
#CONFIG_LV_Z_SHELL=y
#CONFIG_LV_USE_LOG=y
#CONFIG_LV_LOG_LEVEL_INFO=y
CONFIG_LV_USE_LABEL=y
# CONFIG_LV_USE_ARC=y
# CONFIG_LV_USE_MONKEY=y
