# This file contains selected Kconfig options for the application.

CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

#CONFIG_BLINK=y

# MCU Boot settings (MCUMGR in application)
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_UART_MCUMGR=y
CONFIG_UART_LINE_CTRL=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_BASE64=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y

# SHT3x_DIS Sensor Driver
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_SHT3XD=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_SHT3XD_TRIGGER_GLOBAL_THREAD=y
CONFIG_SHT3XD_SINGLE_SHOT_MODE=y

# DS18B20 Sensor Driver
CONFIG_W1=y
CONFIG_DS18B20=y

# Example (mock) Sensor Driver
CONFIG_EXAMPLE_SENSOR=y

# Zbus - internal pub-sub bus
CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y

# Enable the shell
#CONFIG_SHELL=y
#CONFIG_FLASH_SHELL=y
#CONFIG_DEVICE_SHELL=y

# Debug flags:
# CONFIG_DEBUG=y
# CONFIG_DEBUG_COREDUMP=y
# CONFIG_DEBUG_THREAD_INFO=y