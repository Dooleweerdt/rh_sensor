name: Build

on:
  push:
  pull_request:
  #schedule:
  #  - cron: "0 0 * * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: rh_sensor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: rh_sensor
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf

      - name: Build firmware
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "Debug output PATH: "
            echo $PATH
            echo "Additional clang args for bindgen:"
            echo "BINDGEN_EXTRA_CLANG_ARGS=--target=thumbv7em-none-eabi -I$(arm-zephyr-eabi-gcc -print-file-name=include)" >> $GITHUB_ENV
          fi
          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf
          # Remove the wifi_settings file as it is encrypted
          pwd
          rm include/app/wifi_settings.h
          west twister -T app -v --inline-logs --integration $EXTRA_TWISTER_FLAGS

      - name: Twister Tests
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "BINDGEN_EXTRA_CLANG_ARGS=--target=thumbv7em-none-eabi -I$(arm-zephyr-eabi-gcc -print-file-name=include)" >> $GITHUB_ENV
          fi
          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf
          west twister -T tests -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
