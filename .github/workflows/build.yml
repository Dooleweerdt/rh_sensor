name: Build

on:
  push:
  pull_request:
  #schedule:
  #  - cron: "0 0 * * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: rh_sensor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: rh_sensor
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf

      - name: Setup macOS LLVM Environment
        if: runner.os == 'macOS'
        run: |
          # Set hardcoded paths for LLVM 20 installed via Homebrew on macOS 26 - fits with GitHub's macOS 26 image
          LLVM_PREFIX=$(brew --prefix llvm@20)
          echo "LIBCLANG_PATH=$LLVM_PREFIX/lib/libclang.dylib" >> $GITHUB_ENV
          echo "CLANG_PATH=$LLVM_PREFIX/bin/clang" >> $GITHUB_ENV
          # Fix cross-compilation issues with Bindgen by defining the correct macros for 64-bit integer literals
          echo "BINDGEN_EXTRA_CLANG_ARGS=-D__INT64_C(c)=c##LL -D__UINT64_C(c)=c##ULL" >> $GITHUB_ENV

      - name: Verify Environment
        if: runner.os == 'macOS'
        run: |
          echo "The clang path is: $CLANG_PATH"
          echo "The libclang path is: $LIBCLANG_PATH"
          echo "The bindgen args are: $BINDGEN_EXTRA_CLANG_ARGS"

      - name: Build firmware
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi

          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf

          # Replace the wifi_settings file with an empty file as the checked-in version is encrypted
          rm include/app/wifi_settings.h
          touch include/app/wifi_settings.h
          west twister -T app -v --inline-logs --integration $EXTRA_TWISTER_FLAGS

      - name: Twister Tests
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi

          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf
          west twister -T tests -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
