name: Build

on:
  push:
  pull_request:
  #schedule:
  #  - cron: "0 0 * * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: rh_sensor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: rh_sensor
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf

      - name: Build firmware
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "Debug output PATH: "
            echo $PATH
            echo "Additional clang args for bindgen:"
            # echo "BINDGEN_EXTRA_CLANG_ARGS=--target=thumbv7em-none-eabi -I$(arm-zephyr-eabi-gcc -print-file-name=include)" >> $GITHUB_ENV
            # 1. Define the missing macros directly to bypass the header conflict
            # 2. Tell clang to target ARM so it doesn't use Mac-specific headers
            #echo "BINDGEN_EXTRA_CLANG_ARGS=-D__INT64_C(c)=cLL -D__UINT64_C(c)=cULL --target=thumbv7em-none-eabi" >> $GITHUB_ENV  
            # 3. Ensure LIBCLANG_PATH is set (common issue on Mac runners)
            #echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
            #which clang
            # Point to the bundled SDK Clang
            export LIBCLANG_PATH="$ZEPHYR_SDK_INSTALL_DIR/llvm/lib"

            # Tell bindgen to use the specific Clang binary from the SDK
            export CLANG_PATH="$ZEPHYR_SDK_INSTALL_DIR/llvm/bin/clang"

            # Force the target so it doesn't use Mac system headers
            export BINDGEN_EXTRA_CLANG_ARGS="--target=thumbv7em-none-eabi -D__INT64_C(c)=cLL -D__UINT64_C(c)=cULL"
          fi
          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf
          # Remove the wifi_settings file as it is encrypted
          pwd
          rm include/app/wifi_settings.h
          west twister -T app -v --inline-logs --integration $EXTRA_TWISTER_FLAGS

      - name: Twister Tests
        working-directory: rh_sensor
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "BINDGEN_EXTRA_CLANG_ARGS=--target=thumbv7em-none-eabi -I$(arm-zephyr-eabi-gcc -print-file-name=include)" >> $GITHUB_ENV
          fi
          west blobs fetch hal_espressif
          rustup target add thumbv7em-none-eabi
          rustup target add riscv32i-unknown-none-elf
          west twister -T tests -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
